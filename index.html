<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 350px;
  margin: auto;
  padding: 15px;
}

.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}

#display {
  width: 100%;
  height: 70px;
  font-size: 28px;
  text-align: right;
  border: none;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
  background: #020617;
  color: #00ffcc;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button:active {
  background: #334155;
}

.equal {
  background: #22c55e;
}

.clear {
  background: #ef4444;
}

footer {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Nexvora Calculator</div>

<input id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('%')">%</button>
<button onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')">-</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<footer>
✨ Created by Abdur Rahman <br>
🚀 Nexvora Lab's
</footer>

</div>

<script>
let display = document.getElementById("display");

function append(value) {
  display.value += value;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    let exp = display.value
      .replace(/×/g, '*')
      .replace(/÷/g, '/');

    display.value = eval(exp);
  } catch {
    display.value = "Error";
  }
}
</script>

</body>
</html>
