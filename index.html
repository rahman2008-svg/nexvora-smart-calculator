<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Smart Scientific Calculator</title>

<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:10px;
}

.title{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

#display{
  width:100%;
  height:70px;
  font-size:26px;
  text-align:right;
  border:none;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  background:#020617;
  color:#00ffcc;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

button{
  height:55px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

button:active{background:#334155;}

.op{background:#0ea5e9;}
.equal{background:#22c55e;}
.fun{background:#9333ea;}

footer{
  text-align:center;
  margin-top:15px;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Nexvora Smart Calculator</div>

<input id="display" readonly>

<div class="grid">

<button onclick="clearAll()" class="op">C</button>
<button onclick="deleteOne()">⌫</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')">×</button>
<button onclick="sqrt()" class="fun">√</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')">-</button>
<button onclick="square()" class="fun">x²</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button>
<button onclick="power()" class="fun">xʸ</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="percent()">%</button>
<button onclick="cube()" class="fun">x³</button>

<button onclick="sin()" class="fun">sin</button>
<button onclick="cos()" class="fun">cos</button>
<button onclick="tan()" class="fun">tan</button>
<button onclick="log()" class="fun">log</button>
<button onclick="ln()" class="fun">ln</button>

<button onclick="factorial()" class="fun">x!</button>
<button onclick="append('Math.PI')">π</button>
<button onclick="append('Math.E')">e</button>
<button onclick="random()">Rand</button>
<button onclick="ans()">ANS</button>

<button onclick="memoryAdd()">M+</button>
<button onclick="memorySub()">M-</button>
<button onclick="memoryRecall()">MR</button>
<button onclick="memoryClear()">MC</button>
<button onclick="toggleMode()" class="op">MODE</button>

</div>

<footer>
✨ Created by Abdur Rahman <br>
🚀 Nexvora Lab's
</footer>

</div>

<script>
let display=document.getElementById("display");
let memory=0;
let lastAnswer=0;
let deg=true;

// Basic
function append(v){display.value+=v;}
function clearAll(){display.value="";}
function deleteOne(){display.value=display.value.slice(0,-1);}

// Calculate
function calculate(){
 try{
  let exp=display.value.replace(/×/g,'*').replace(/÷/g,'/');
  lastAnswer=eval(exp);
  display.value=lastAnswer;
 }catch{display.value="Error";}
}

// %
function percent(){display.value=eval(display.value)/100;}

// Power
function power(){display.value+="**";}

// Functions
function sqrt(){display.value=Math.sqrt(eval(display.value));}
function square(){display.value=Math.pow(eval(display.value),2);}
function cube(){display.value=Math.pow(eval(display.value),3);}

// Degree/Radian convert
function toRad(x){return deg?x*Math.PI/180:x;}

function sin(){display.value=Math.sin(toRad(eval(display.value)));}
function cos(){display.value=Math.cos(toRad(eval(display.value)));}
function tan(){display.value=Math.tan(toRad(eval(display.value)));}

function log(){display.value=Math.log10(eval(display.value));}
function ln(){display.value=Math.log(eval(display.value));}

function factorial(){
 let n=eval(display.value);
 if(n<0)return display.value="Error";
 let r=1;
 for(let i=1;i<=n;i++)r*=i;
 display.value=r;
}

function random(){display.value=Math.random();}
function ans(){display.value+=lastAnswer;}

// Memory
function memoryAdd(){memory+=Number(display.value)||0;}
function memorySub(){memory-=Number(display.value)||0;}
function memoryRecall(){display.value=memory;}
function memoryClear(){memory=0;}

// Mode toggle
function toggleMode(){
 deg=!deg;
 alert(deg?"Degree Mode":"Radian Mode");
}

// Service Worker
if('serviceWorker'in navigator){
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
