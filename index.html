<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Smart Calculator</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  max-width: 400px;
  width: 100%;
  padding: 10px;
}
#display {
  width: 100%;
  height: 60px;
  font-size: 24px;
  text-align: right;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: #00ffcc;
}
.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
button {
  padding: 15px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}
button:active {
  background: #334155;
}
.equal { background: #22c55e; }
.clear { background: #ef4444; }
footer {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>
<body>

<div class="container">
<h2 style="text-align:center;">🧠 Nexvora Smart Calculator</h2>
<input type="text" id="display" readonly>

<div class="buttons">
<!-- Row 1 -->
<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('%')">%</button>

<!-- Row 2 -->
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>
<button onclick="memoryRecall()">MR</button>

<!-- Row 3 -->
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>
<button onclick="memoryPlus()">M+</button>

<!-- Row 4 -->
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">-</button>
<button onclick="memoryMinus()">M-</button>

<!-- Row 5 -->
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('**2')">x²</button>
<button onclick="append('**0.5')">√x</button>
<button class="equal" onclick="calculate()">=</button>

<!-- Row 6 (Extra) -->
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.log(')">ln</button>
<button onclick="append('Math.log10(')">log</button>

</div>

<footer>
Created by Abdur Rahman | Nexvora Lab's
</footer>
</div>

<script>
let display = document.getElementById('display');
let memory = 0;

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = '';
}

function deleteLast() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    try {
        let result = eval(display.value.replace(/÷/g,'/').replace(/×/g,'*'));
        display.value = result;
    } catch {
        display.value = 'Error';
    }
}

// Memory functions
function memoryPlus() { memory += Number(display.value) || 0; clearDisplay(); }
function memoryMinus() { memory -= Number(display.value) || 0; clearDisplay(); }
function memoryRecall() { display.value = memory; }

</script>
</body>
</html>
