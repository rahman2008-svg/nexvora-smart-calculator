<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Smart Scientific Calculator</title>
<style>
:root {
  --bg: #1a1a1a;
  --btn: #2c2c2c;
  --btn-hover: #00ffcc;
  --text: #fff;
  --accent: #00ffcc;
}
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
}
h1 { margin:10px; font-size:1.5rem; text-align:center;}
#display {
  width: 95%;
  height: 70px;
  background:#000;
  color: var(--accent);
  font-size:2rem;
  text-align:right;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}
#history {
  width:95%;
  max-height:150px;
  overflow-y:auto;
  background:#222;
  padding:5px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:0.9rem;
}
#buttons {
  width:95%;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-bottom:20px;
}
button {
  padding:15px;
  font-size:1.2rem;
  border:none;
  border-radius:8px;
  background:var(--btn);
  color:var(--text);
  cursor:pointer;
  transition:0.2s;
}
button:hover { background: var(--btn-hover); color:#000;}
</style>
</head>
<body>
<h1>Nexvora Smart Scientific Calculator</h1>
<div id="display">0</div>
<div id="history"></div>
<div id="buttons">
  <!-- Row 1 -->
  <button onclick="clearAll()">AC</button>
  <button onclick="deleteEntry()">DEL</button>
  <button onclick="appendValue('%')">%</button>
  <button onclick="appendValue('/')">÷</button>
  <button onclick="appendValue('*')">×</button>
  <button onclick="appendValue('-')">-</button>

  <!-- Row 2 -->
  <button onclick="appendValue('7')">7</button>
  <button onclick="appendValue('8')">8</button>
  <button onclick="appendValue('9')">9</button>
  <button onclick="appendValue('(')">(</button>
  <button onclick="appendValue(')')">)</button>
  <button onclick="appendValue('+')">+</button>

  <!-- Row 3 -->
  <button onclick="appendValue('4')">4</button>
  <button onclick="appendValue('5')">5</button>
  <button onclick="appendValue('6')">6</button>
  <button onclick="appendValue('Math.pow(')">x^y</button>
  <button onclick="appendValue('Math.sqrt(')">√</button>
  <button onclick="calculate()">=</button>

  <!-- Row 4 -->
  <button onclick="appendValue('1')">1</button>
  <button onclick="appendValue('2')">2</button>
  <button onclick="appendValue('3')">3</button>
  <button onclick="appendValue('Math.sin(')">sin</button>
  <button onclick="appendValue('Math.cos(')">cos</button>
  <button onclick="appendValue('Math.tan(')">tan</button>

  <!-- Row 5 -->
  <button onclick="appendValue('0')">0</button>
  <button onclick="appendValue('.')">.</button>
  <button onclick="appendValue('Math.PI')">π</button>
  <button onclick="appendValue('Math.E')">e</button>
  <button onclick="recallAnswer()">Ans</button>
  <button onclick="appendValue('!')">n!</button>
</div>

<script>
let display = document.getElementById('display');
let historyDiv = document.getElementById('history');
let lastAnswer = 0;
let history = JSON.parse(localStorage.getItem('calcHistory')) || [];

function renderHistory() {
  historyDiv.innerHTML = history.join('<br>');
}
renderHistory();

function appendValue(val) {
  if(display.innerText==='0') display.innerText=val;
  else display.innerText += val;
}

function clearAll() {
  display.innerText='0';
}

function deleteEntry() {
  display.innerText = display.innerText.slice(0,-1) || '0';
}

function calculate() {
  try {
    let exp = display.innerText.replace(/×/g,'*').replace(/÷/g,'/').replace(/n!/g,'factorial');
    let result = eval(exp);
    lastAnswer = result;
    display.innerText = result;
    addToHistory(display.innerText + " = " + result);
  } catch(e) {
    display.innerText='Error';
  }
}

function factorial(n) {
  n = Math.floor(n);
  if(n<0) return 'Error';
  if(n===0) return 1;
  let res=1;
  for(let i=1;i<=n;i++) res*=i;
  return res;
}

function recallAnswer() {
  appendValue(lastAnswer);
}

function addToHistory(entry){
  history.push(entry);
  if(history.length>50) history.shift(); // Keep last 50
  localStorage.setItem('calcHistory', JSON.stringify(history));
  renderHistory();
}

// Responsive font size
window.addEventListener('resize', ()=>{
  let width = window.innerWidth;
  display.style.fontSize = Math.max(24,width/15)+'px';
});
</script>
</body>
</html>
