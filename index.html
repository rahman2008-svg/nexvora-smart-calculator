<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Smart Scientific Calculator</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #1a1a1a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 0;
}
.container {
  width: 100%;
  max-width: 420px;
  padding: 10px;
}
#display {
  width: 100%;
  min-height: 70px;
  font-size: 28px;
  text-align: right;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 12px;
  border: none;
  background: #222;
  color: #00ffcc;
  word-wrap: break-word;
}
.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
button {
  padding: 18px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #333;
  color: #fff;
  cursor: pointer;
}
button:active { background: #555; }
.equal { background: #22c55e; }
.clear { background: #ef4444; }
footer {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.8;
}
.history {
  background: #111;
  padding: 10px;
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 10px;
  border-radius: 8px;
  font-size: 14px;
  color: #ccc;
}
</style>
</head>
<body>

<div class="container">
<h2 style="text-align:center;">🧠 Nexvora Smart Scientific Calculator</h2>
<div class="history" id="history"></div>
<input type="text" id="display" readonly>

<div class="buttons">
<!-- Row 1 -->
<button class="clear" onclick="allClear()">AC</button>
<button onclick="deleteLast()">DEL</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('%')">%</button>

<!-- Row 2 -->
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>
<button onclick="memoryRecall()">MR</button>

<!-- Row 3 -->
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>
<button onclick="memoryPlus()">M+</button>

<!-- Row 4 -->
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button>
<button onclick="memoryMinus()">M-</button>

<!-- Row 5 -->
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('**2')">x²</button>
<button onclick="append('**0.5')">√x</button>
<button class="equal" onclick="calculate()">=</button>

<!-- Row 6 Scientific -->
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.log(')">ln</button>
<button onclick="append('Math.log10(')">log</button>

<!-- Row 7 Scientific -->
<button onclick="append('Math.asin(')">asin</button>
<button onclick="append('Math.acos(')">acos</button>
<button onclick="append('Math.atan(')">atan</button>
<button onclick="append('Math.PI')">π</button>
<button onclick="append('Math.E')">e</button>

<!-- Row 8 Extras -->
<button onclick="append('Math.pow(')">x^y</button>
<button onclick="append('1/(')">1/x</button>
<button onclick="append('!')">n!</button>
<button onclick="useAns()">Ans</button>
<button onclick="clearHistory()">Clear History</button>
</div>

<footer>
Created by Abdur Rahman | Nexvora Lab's
</footer>
</div>

<script>
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(()=>console.log('Service Worker Registered'));
}

let display = document.getElementById('display');
let historyDiv = document.getElementById('history');
let memory = 0;
let lastAns = 0;
let calcHistory = JSON.parse(localStorage.getItem('calcHistory')) || [];

function renderHistory() {
  historyDiv.innerHTML = '';
  for(let h of calcHistory){
    let div = document.createElement('div');
    div.textContent = h;
    historyDiv.appendChild(div);
  }
}
renderHistory();

function append(value){ display.value += value; }
function allClear(){ display.value=''; memory=0; }
function deleteLast(){ display.value = display.value.slice(0,-1); }
function useAns(){ display.value += lastAns; }
function memoryPlus(){ memory += Number(display.value)||0; display.value=''; }
function memoryMinus(){ memory -= Number(display.value)||0; display.value=''; }
function memoryRecall(){ display.value = memory; }

function factorial(n){
    if(n<0) return NaN;
    if(n===0 || n===1) return 1;
    let res=1;
    for(let i=2;i<=n;i++) res*=i;
    return res;
}

function replaceFactorials(expr){
    return expr.replace(/(\d+)!/g, (_, n)=> factorial(Number(n)));
}

function calculate(){
    try{
        let expr = display.value.replace(/÷/g,'/').replace(/×/g,'*');
        expr = replaceFactorials(expr);
        let result = eval(expr);
        lastAns=result;
        display.value=result;

        calcHistory.push(`${expr} = ${result}`);
        if(calcHistory.length>50) calcHistory.shift();
        localStorage.setItem('calcHistory',JSON.stringify(calcHistory));
        renderHistory();
    }catch{ display.value='Error'; }
}

function clearHistory(){ calcHistory=[]; localStorage.setItem('calcHistory',JSON.stringify(calcHistory)); renderHistory(); }
</script>
</body>
</html>
