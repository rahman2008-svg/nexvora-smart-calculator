<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Lab's Smart Calculator</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
    }

    h1 {
        text-align: center;
        margin: 10px 0;
        color: #222;
    }

    .calculator {
        background: #222;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        max-width: 400px;
        width: 95vw;
    }

    .display {
        background: #444;
        color: #fff;
        font-size: 2em;
        text-align: right;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 10px;
        word-wrap: break-word;
        min-height: 50px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
    }

    button {
        padding: 15px;
        font-size: 1em;
        border: none;
        border-radius: 5px;
        background: #666;
        color: white;
        cursor: pointer;
    }

    button.operator { background: #f57c00; }
    button.clear { background: #d32f2f; }
    button.memory { background: #1976d2; }
    button.zero { grid-column: span 2; }
    button:hover { opacity: 0.8; }

    .history {
        background: #fff;
        padding: 10px;
        margin-top: 10px;
        border-radius: 5px;
        max-height: 150px;
        overflow-y: auto;
        font-size: 0.9em;
        color: #222;
    }

    .footer {
        text-align: center;
        margin-top: 10px;
        font-size: 0.9em;
        color: #555;
    }
</style>
</head>
<body>

<h1>Nexvora Lab's Smart Calculator</h1>

<div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
        <!-- Memory -->
        <button class="memory" onclick="memoryClear()">MC</button>
        <button class="memory" onclick="memoryRecall()">MR</button>
        <button class="memory" onclick="memoryAdd()">M+</button>
        <button class="memory" onclick="memorySubtract()">M-</button>
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="backspace()">⌫</button>

        <!-- Numbers & basic -->
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button onclick="appendOperator('/')">÷</button>
        <button onclick="appendOperator('(')">(</button>
        <button onclick="appendOperator(')')">)</button>

        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button onclick="appendOperator('*')">×</button>
        <button onclick="appendOperator('**')">xʸ</button>
        <button onclick="appendOperator('Math.sqrt(')">√</button>

        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button onclick="appendOperator('-')">-</button>
        <button onclick="appendOperator('Math.sin(')">sin</button>
        <button onclick="appendOperator('Math.cos(')">cos</button>

        <button onclick="appendNumber('0')" class="zero">0</button>
        <button onclick="appendOperator('.')">.</button>
        <button onclick="appendOperator('+')">+</button>
        <button onclick="appendOperator('Math.tan(')">tan</button>
        <button onclick="appendOperator('Math.log(')">ln</button>
        <button onclick="appendOperator('Math.log10(')">log</button>

        <!-- Advanced -->
        <button onclick="appendOperator('Math.exp(')">eˣ</button>
        <button onclick="appendOperator('Math.PI')">π</button>
        <button onclick="appendOperator('Math.E')">e</button>
        <button onclick="appendOperator('!')">x!</button>
        <button onclick="appendOperator('ANS')">ANS</button>
        <button class="operator" onclick="calculate()">=</button>
    </div>

    <div class="history" id="history">
        <strong>History:</strong>
        <ul id="historyList"></ul>
    </div>
</div>

<div class="footer">
    Created by Abdur Rahman
</div>

<script>
let display = document.getElementById('display');
let currentInput = '';
let memory = 0;
let lastAnswer = 0;
let historyList = document.getElementById('historyList');

function appendNumber(num) { currentInput += num; display.textContent = currentInput; }
function appendOperator(op) { currentInput += op; display.textContent = currentInput; }
function clearDisplay() { currentInput = ''; display.textContent = '0'; }
function backspace() { currentInput = currentInput.slice(0, -1); display.textContent = currentInput || '0'; }

function memoryClear() { memory = 0; }
function memoryRecall() { appendNumber(memory); }
function memoryAdd() { memory += evalExpression(); }
function memorySubtract() { memory -= evalExpression(); }

function evalExpression() {
    try {
        let exp = currentInput.replace(/(\d+)!/g, (_, n) => factorial(Number(n)));
        exp = exp.replace(/ANS/g, lastAnswer);
        return eval(exp);
    } catch { return 0; }
}

function factorial(n) { if(n<0) return NaN; let f=1; for(let i=2;i<=n;i++) f*=i; return f; }

function calculate() {
    try {
        let exp = currentInput.replace(/(\d+)!/g, (_, n) => factorial(Number(n)));
        exp = exp.replace(/ANS/g, lastAnswer);
        let result = eval(exp);
        lastAnswer = result;
        display.textContent = result;

        // Add to history
        let li = document.createElement('li');
        li.textContent = currentInput + " = " + result;
        historyList.appendChild(li);

        currentInput = '';
    } catch {
        display.textContent = 'Error';
        currentInput = '';
    }
}
</script>

</body>
</html>
